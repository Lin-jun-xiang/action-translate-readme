name: 'Auto Translate Readme'

description: 'Automatically translate the language of README via Github Action'

author: 'https://github.com/Lin-jun-xiang'

branding:
  icon: "book-open"
  color: "red"

inputs:
  token:
    description: 'Secrets Token to authorize bot account'
    required: true
  g4f_provider:
    description: 'gpt4free provider'
    required: false
  langs:
    description: 'Languages for README'
    required: true
  openai_api_key:
    description: 'If you want to use the openai gpt3.5 instead of gpt4free, you should pass the key.'
    required: false

runs:
      using: "composite"
      steps:
        - name: Checkout Code
          uses: actions/checkout@v3
          with:
            fetch-depth: 3
            token: ${{ inputs.token }}

        - name: Set Up Python
          uses: actions/setup-python@v3
          with:
            python-version: '3.10'

        - name: Install Dependencies
          shell: bash
          run: |
            pip install PyExecJS
            pip install -U g4f
            pip install --upgrade tenacity
            pip install openai

        - name: Translate README
          shell: bash
          working-directory: .
          run: |
            export PROVIDER=${{ inputs.g4f_provider }}
            export LANGS=${{ inputs.langs }}
            export OPENAI_API_KEY=${{ inputs.openai_api_key }}
            python $GITHUB_ACTION_PATH/translation.py

        - name: Git Commit
          shell: bash
          working-directory: .
          run: |
            git config --global user.email "username@users.noreply.github.comm";
            git config --global user.name "Continuous Integration"

            chmod +x $GITHUB_ACTION_PATH/commit.sh
            bash $GITHUB_ACTION_PATH/commit.sh
